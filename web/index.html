<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Forge — an agent-coached training log</title>
  <meta name="description" content="Your own strength & conditioning coach: an agent that reads your real training data and proposes your week. Self-hosted, private, two seats.">
  <meta name="theme-color" content="#060708">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Forge">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">

  <!-- Link-preview (Open Graph + Twitter) cards for WhatsApp, iMessage, Slack, etc.
       Scrapers don't run JS, so these must live in the static shell. __ORIGIN__ is
       substituted with the request's own origin server-side (main.py::_render_index)
       so the absolute image/url track whichever domain the link was shared from;
       in dev the Vite transform below drops the token, leaving valid relative URLs. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Forge">
  <meta property="og:title" content="Forge — an agent-coached training log">
  <meta property="og:description" content="Your own strength & conditioning coach: an agent that reads your real training data and proposes your week. Self-hosted, private, two seats.">
  <meta property="og:url" content="__ORIGIN__/">
  <meta property="og:image" content="__ORIGIN__/og-image.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Forge — your coach reads your real training data">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Forge — an agent-coached training log">
  <meta name="twitter:description" content="Your own strength & conditioning coach: an agent that reads your real training data and proposes your week. Self-hosted, private, two seats.">
  <meta name="twitter:image" content="__ORIGIN__/og-image.png">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
