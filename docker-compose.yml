services:
  db:
    image: postgres:16-alpine
    container_name: forge-db
    environment:
      - POSTGRES_DB=forge
      - POSTGRES_USER=forge
      - POSTGRES_PASSWORD=change-me-long-random # must match the password inside DATABASE_URL below
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U forge -d forge || exit 1
      start_period: 5s
      timeout: 3s
      interval: 5s
      retries: 12
    restart: unless-stopped

  api:
    image: ghcr.io/lemmy-winks/forge:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    init: true
    container_name: forge
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "33524:8000"
    environment:
      # --- required ---
      - DATABASE_URL=postgresql+psycopg://forge:change-me-long-random@db:5432/forge
      - SESSION_SECRET=change-me-to-a-long-random-string
      - ALLOWED_USERS=you@example.com:You,partner@example.com:Partner # the entire allowlist; first user is admin
      # --- ingress ---
      - BASE_URL=http://localhost:33524 # set to your public URL once behind a reverse proxy
      # --- Google sign-in (optional; while empty, dev sign-in buttons show — LAN use only) ---
      - GOOGLE_CLIENT_ID=
      - GOOGLE_CLIENT_SECRET=
      # --- the coach (optional; chat + weekly reviews stay idle until a key is set) ---
      - ANTHROPIC_API_KEY=
      - COACH_MODEL=claude-sonnet-5
      - COACH_TZ=Europe/London
      # --- Withings direct OAuth (optional; webhooks need public ingress) ---
      - WITHINGS_CLIENT_ID=
      - WITHINGS_CLIENT_SECRET=
      # --- web push (optional; generate with: docker exec forge python -m app.vapid) ---
      - VAPID_PUBLIC_KEY=
      - VAPID_PRIVATE_KEY=
      - VAPID_SUBJECT=mailto:forge@localhost
      # --- workout reminder window, 24h clock ---
      - REMINDER_HOUR=16
      - QUIET_START=8
      - QUIET_END=21
    volumes:
      - media:/data/media
    healthcheck:
      test: python -c "import urllib.request;urllib.request.urlopen('http://localhost:8000/healthz')" || exit 1
      start_period: 20s
      timeout: 3s
      interval: 30s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
  media:
