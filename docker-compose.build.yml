# Build-from-source add-on. The main compose file is image-only so it can be
# pasted straight into Portainer; from a clone of the repo, layer this on top:
#
#   docker compose -f docker-compose.yml -f docker-compose.override.yml \
#                  -f docker-compose.build.yml up -d --build
#
# (drop the override flag if you don't have one — it stops auto-merging as
# soon as -f is used, so list it explicitly)
services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
